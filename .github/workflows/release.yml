name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          sudo xcode-select -s /Applications/Xcode_26.app 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode.app

      - name: Build
        run: make build && make app

      - name: Sign & Notarize
        if: ${{ secrets.DEVELOPER_ID_CERT != '' }}
        env:
          DEVELOPER_ID_CERT: ${{ secrets.DEVELOPER_ID_CERT }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bash Scripts/notarize.sh build/release/npm-remote-control.app

      - name: Package DMG
        run: bash Scripts/build-dmg.sh build/release/npm-remote-control.app build/release/npm-remote-control.dmg

      - name: Zip .app
        run: |
          cd build/release
          zip -r npm-remote-control-app.zip npm-remote-control.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/release/npm-remote-control.dmg
            build/release/npm-remote-control-app.zip
