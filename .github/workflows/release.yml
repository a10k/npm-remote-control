name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make build && make app

      - name: Sign and Notarize
        if: env.DEVELOPER_ID_CERT != ''
        env:
          DEVELOPER_ID_CERT: ${{ secrets.DEVELOPER_ID_CERT }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bash Scripts/notarize.sh build/release/npm-remote-control.app

      - name: Package
        run: |
          bash Scripts/build-dmg.sh build/release/npm-remote-control.app build/release/npm-remote-control.dmg
          cd build/release && zip -r npm-remote-control-app.zip npm-remote-control.app

      - name: Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            build/release/npm-remote-control.dmg \
            build/release/npm-remote-control-app.zip
